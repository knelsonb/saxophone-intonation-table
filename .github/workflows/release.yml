name: Release binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: intonation-analyzer-linux-x86_64
            binary_name: intonation-analyzer
          - os: windows-latest
            artifact_name: intonation-analyzer-windows-x86_64.exe
            binary_name: intonation-analyzer.exe

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install system audio deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y portaudio19-dev libportaudio2 \
            libxcb-cursor0 libxcb-util1 \
            libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-sync1 \
            libxcb-xfixes0 libxcb-xinerama0 libxcb-xkb1

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Pin Pillow >=9.1 — earlier versions silently ignored the `sizes`
          # kwarg on ICO export and produced a single-frame file. Pin
          # PyInstaller to 6.x — collect_dynamic_libs behavior is stable on
          # this line; a 7.x bump could silently regress portaudio bundling.
          pip install "pyinstaller~=6.0" "Pillow~=10.0"

      - name: Generate icon assets
        # QT_QPA_PLATFORM=offscreen is load-bearing on the Linux runner — it
        # has no X display, and QApplication() would crash without a platform.
        # Harmless on Windows.
        run: python tools/make_icon.py
        env:
          QT_QPA_PLATFORM: offscreen

      - name: Build binary
        run: pyinstaller --clean -y intonation_analyzer.spec

      - name: Rename artifact
        shell: bash
        run: |
          mv dist/${{ matrix.binary_name }} dist/${{ matrix.artifact_name }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release-assets
          find artifacts -type f -exec cp {} release-assets/ \;
          ls -la release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
          fail_on_unmatched_files: true
